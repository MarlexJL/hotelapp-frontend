<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Juan" #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="$dataSource()" matSort>

    <ng-container matColumnDef="idReservation">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{row.idReservation}} </td>
    </ng-container>

    <ng-container matColumnDef="customerName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> CLIENTE </th>
      <td mat-cell *matCellDef="let row"> {{row.customerName}} </td>
    </ng-container>

    <ng-container matColumnDef="checkInDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> CHECK-IN </th>
      <td mat-cell *matCellDef="let row"> {{row.checkInDate}} </td>
    </ng-container>

    <ng-container matColumnDef="checkOutDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> CHECK-OUT </th>
      <td mat-cell *matCellDef="let row"> {{row.checkOutDate}} </td>
    </ng-container>

    <ng-container matColumnDef="idRoom">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> HABITACIÓN </th>
      <!-- <td mat-cell *matCellDef="let row"> {{row.idRoom}} </td> -->
       <td mat-cell *matCellDef="let row">{{ getRoomNumber(row.idRoom) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> ACTIONS </th>
      <td mat-cell *matCellDef="let row">
        <button mat-flat-button (click)="openDialog(row)">
          <span>Edit</span>
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-flat-button class="cancel-button" (click)="delete(row.idReservation)">
          <span>Delete</span>
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" aria-label="Select page of reservations"></mat-paginator>

  <button mat-fab style="float: right;" (click)="openDialog()">
    <mat-icon>add</mat-icon>
  </button>
</div>
